site_name: My Docs

theme:
  name: material
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  logo: assets/logo.png
  favicon: assets/logo.png
  palette: 
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
      primary: green
      accent: deep purple

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: blue
      accent: deep orange

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

  - admonition
  - pymdownx.details
nav:
  - Home: index.md
  - Content Tabs: content.md
  - Overview of Project: assignment1.md
  - Normal Heuristic: assignment2.md
  - User Stories: assignment3.md
  - UX Problem: assignment4.md
  - Wireframes: assignment5.md
  - low-Fi Prototypes: assignment6.md
  - Hifi Prototypes: assignment7.md
  - Usability Testing & Findings: assignment8.md
  - Colour and Typography – Toronto Cupcake: assignment9.md